    <script>
        function change() {
            if ($('span:lang(en)').css('display') === "none") {
                $('span:lang(en)').css('display', 'inline');
                $('span:lang(zh)').css('display', 'none');
                $("#change").text("中文");
            }
            else {
                $('span:lang(en)').css('display', 'none');
                $('span:lang(zh)').css('display', 'inline');
                $("#change").text("EN");

            }
        }
    </script>
    <script>
        $(".element").each(function () {
            var $this = $(this);
            $this.typed({
                strings: $this.attr('data-elements').split(','),
                typeSpeed: 100,
                backDelay: 3000
            });
        });

        function logSubmit(event) {
            event.preventDefault();

            let size = parseInt(n.value);
            let tmp = word.value.toString().split('');
            let transpositions = []
            for (let i = 0; i < tmp.length; i++)
            transpositions.push([parseInt(tmp[i]), parseInt(tmp[i])+1]);

            let res = transpositions[0]
            for (let idx = 1; idx < transpositions.length; idx ++) {
                res = permutationProduct(res, transpositions[idx], size)
            }

            //521425435
            log.innerHTML = `The permutation is: <br /> <b>(${Object.values(res)})</b>`;
        }

        function transpositionToPermutation(transposition, size) {
            let permutation = {}
            for (let i = 1; i < size + 1; i++) permutation[i] = i
            permutation[transposition[0]] = transposition[1]
            permutation[transposition[1]] = transposition[0]
            return permutation
        }

        function permutationProduct(a, b, size) {
            if (Array.isArray(a))
                a = transpositionToPermutation(a, size)
            if (Array.isArray(b))
                b = transpositionToPermutation(b, size)

            c = {}

            for (let i = 1; i < size + 1; i++)
                c[i] = a[b[i]]

            return c   
        }

        const form = document.getElementById('wordToPermutation');
        const log = document.getElementById('log');
        const word = document.getElementById('word');
        const n = document.getElementById('size');
        form.addEventListener('submit', logSubmit);
    </script>
